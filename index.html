<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>WebXR Industrial AMR Controller</title>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff88;
            --neon-red: #ff3131;
            --neon-yellow: #f8ff00;
            --glass-bg: rgba(7, 10, 20, 0.9);
            --industrial-font: 'Inter', system-ui, -apple-system, sans-serif;
            --panel-border: 1px solid rgba(0, 242, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            font-family: var(--industrial-font);
            color: white;
            user-select: none;
        }

        /* Cardboard Split Screen Viewports */
        .viewport {
            width: 50%;
            height: 100%;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            border-right: 1px solid #111;
        }

        .camera-feed {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); /* VR Lens correction factor */
        }

        /* HUD Overlay Layer */
        .hud-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Glassmorphism Panels */
        .panel {
            background: var(--glass-bg);
            border: var(--panel-border);
            backdrop-filter: blur(12px);
            padding: 10px 18px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            margin-bottom: 2px;
        }

        .value {
            font-size: 16px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Center Command Feedback */
        .center-hud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .command-box {
            font-size: 26px;
            font-weight: 950;
            padding: 16px 40px;
            border-radius: 4px;
            background: rgba(0, 242, 255, 0.1);
            border-left: 4px solid var(--neon-blue);
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .command-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Cooldown Progress Bar */
        .cooldown-bar {
            width: 120px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .cooldown-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: var(--neon-blue);
            transition: width linear;
        }

        /* Status Indicators */
        .tracking-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 700;
        }

        .indicator-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: grey;
        }

        .indicator-dot.active {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        /* Emergency Flash */
        .emergency-flash {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(255, 0, 0, 0.5) 100%);
            z-index: 5;
            display: none;
            animation: blink 0.4s infinite alternate;
        }

        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }

        /* Initial Setup Overlay */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #020408;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-init {
            padding: 18px 50px;
            background: var(--neon-blue);
            color: black;
            font-weight: 900;
            border: none;
            border-radius: 4px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-init:hover {
            box-shadow: 0 0 30px var(--neon-blue);
            transform: translateY(-2px);
        }

        .hidden { display: none !important; }

        /* Crosshair */
        .target {
            position: absolute;
            width: 20px; height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="splash">
        <h1 style="letter-spacing: 10px; margin-bottom: 10px;">WEBXR VR</h1>
        <p style="color: grey; font-size: 12px; margin-bottom: 40px;">INDUSTRIAL GESTURE CONTROLLER MK-II</p>
        <button class="btn-init" onclick="initApp()">ESTABLISH NEURAL LINK</button>
    </div>

    <!-- Source logic -->
    <video id="input_video" class="hidden" playsinline autoplay muted></video>

    <!-- Stereo View -->
    <div class="viewport">
        <video id="video-L" class="camera-feed" playsinline autoplay muted></video>
        <div class="emergency-flash" id="flash-L"></div>
        <div class="target"></div>
        <div class="hud-overlay">
            <div class="header">
                <div class="panel">
                    <div class="label">Voltage</div>
                    <div class="value">24.4V</div>
                </div>
                <div class="panel">
                    <div class="tracking-status">
                        <div id="dot-L" class="indicator-dot"></div>
                        LINK: <span id="link-L">LOCALIZING</span>
                    </div>
                </div>
            </div>
            <div class="center-hud">
                <div id="cmd-L" class="command-box">STANDBY</div>
                <div class="cooldown-bar"><div id="cool-L" class="cooldown-fill"></div></div>
            </div>
            <div class="footer">
                <div class="panel">
                    <div class="label">Coord X</div>
                    <div id="x-L" class="value">0.0</div>
                </div>
                <div class="panel">
                    <div class="label">Coord Y</div>
                    <div id="y-L" class="value">0.0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="viewport">
        <video id="video-R" class="camera-feed" playsinline autoplay muted></video>
        <div class="emergency-flash" id="flash-R"></div>
        <div class="target"></div>
        <div class="hud-overlay">
            <div class="header">
                <div class="panel">
                    <div class="label">Voltage</div>
                    <div class="value">24.4V</div>
                </div>
                <div class="panel">
                    <div class="tracking-status">
                        <div id="dot-R" class="indicator-dot"></div>
                        LINK: <span id="link-R">LOCALIZING</span>
                    </div>
                </div>
            </div>
            <div class="center-hud">
                <div id="cmd-R" class="command-box">STANDBY</div>
                <div class="cooldown-bar"><div id="cool-R" class="cooldown-fill"></div></div>
            </div>
            <div class="footer">
                <div class="panel">
                    <div class="label">Coord X</div>
                    <div id="x-R" class="value">0.0</div>
                </div>
                <div class="panel">
                    <div class="label">Coord Y</div>
                    <div id="y-R" class="value">0.0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Utilities: Smoother for jittery landmarks
        class LatencySmoother {
            constructor(windowSize = 5) {
                this.history = [];
                this.size = windowSize;
            }
            smooth(val) {
                this.history.push(val);
                if (this.history.length > this.size) this.history.shift();
                return this.history.reduce((a, b) => a + b, 0) / this.history.length;
            }
        }

        const smootherX = new LatencySmoother(5);
        const smootherY = new LatencySmoother(5);

        // Core State
        let splash = document.getElementById('splash');
        let lastCommand = 'NONE';
        let commandCooldown = false;
        const COOLDOWN_MS = 1000;
        let stabilityCounter = 0;
        const STABILITY_THRESHOLD = 3; // Frames required for a gesture to stick
        let currentGesture = 'NONE';

        // UI Pointers
        const ui = {
            cmd: [document.getElementById('cmd-L'), document.getElementById('cmd-R')],
            cool: [document.getElementById('cool-L'), document.getElementById('cool-R')],
            dots: [document.getElementById('dot-L'), document.getElementById('dot-R')],
            links: [document.getElementById('link-L'), document.getElementById('link-R')],
            x: [document.getElementById('x-L'), document.getElementById('x-R')],
            y: [document.getElementById('y-L'), document.getElementById('y-R')],
            flashes: [document.getElementById('flash-L'), document.getElementById('flash-R')]
        };

        function dispatchCommand(cmd) {
            if (commandCooldown || cmd === 'NONE') return;

            // Trigger cooldown
            commandCooldown = true;
            ui.cool.forEach(c => {
                c.style.transition = 'none';
                c.style.width = '100%';
                setTimeout(() => {
                    c.style.transition = `width ${COOLDOWN_MS}ms linear`;
                    c.style.width = '0%';
                }, 10);
            });

            setTimeout(() => { commandCooldown = false; }, COOLDOWN_MS);

            // Update UI
            ui.cmd.forEach(c => {
                c.textContent = cmd;
                c.classList.add('active');
            });
            
            ui.flashes.forEach(f => f.style.display = cmd === 'STOP' ? 'block' : 'none');

            // Send to parent
            console.log(`[NeuralLink] Triggering: ${cmd}`);
            window.parent.postMessage({ type: 'ROBOT_COMMAND', command: cmd }, '*');

            // Clear visual notification after 700ms
            setTimeout(() => {
                ui.cmd.forEach(c => c.classList.remove('active'));
            }, 700);
        }

        function onResults(results) {
            const hasHands = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
            
            ui.dots.forEach(d => d.classList.toggle('active', hasHands));
            ui.links.forEach(l => l.textContent = hasHands ? 'LOCKED' : 'LOCALIZING');

            if (hasHands) {
                const rawLandmarks = results.multiHandLandmarks[0];
                
                // Smoothing
                const sx = smootherX.smooth(rawLandmarks[8].x);
                const sy = smootherY.smooth(rawLandmarks[8].y);

                ui.x.forEach(v => v.textContent = sx.toFixed(2));
                ui.y.forEach(v => v.textContent = sy.toFixed(2));

                // Pose Analysis
                const indexUp = rawLandmarks[8].y < rawLandmarks[6].y;
                const middleUp = rawLandmarks[12].y < rawLandmarks[10].y;
                const ringUp = rawLandmarks[16].y < rawLandmarks[14].y;
                const pinkyUp = rawLandmarks[20].y < rawLandmarks[18].y;
                const thumbUp = rawLandmarks[4].y < rawLandmarks[2].y;

                const count = [indexUp, middleUp, ringUp, pinkyUp].filter(x => x).length;

                let detected = 'NONE';

                if (count >= 3) {
                    detected = 'STOP';
                } else if (count === 0) {
                    detected = 'PICK';
                } else if (count === 1 && indexUp) {
                    // Orientation mapping
                    if (sy < 0.3) detected = 'UP';
                    else if (sy > 0.7) detected = 'DOWN';
                    else if (sx < 0.3) detected = 'LEFT';
                    else if (sx > 0.7) detected = 'RIGHT';
                    else detected = 'MOVE';
                } else if (count === 2 && indexUp && middleUp) {
                    detected = 'RETURN';
                }

                // Stability Logic
                if (detected === currentGesture) {
                    stabilityCounter++;
                } else {
                    currentGesture = detected;
                    stabilityCounter = 0;
                }

                if (stabilityCounter >= STABILITY_THRESHOLD) {
                    dispatchCommand(detected);
                }

            } else {
                currentGesture = 'NONE';
                stabilityCounter = 0;
            }
        }

        async function initApp() {
            splash.style.display = 'none';

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults(onResults);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 480 }
                });

                document.getElementById('input_video').srcObject = stream;
                document.getElementById('video-L').srcObject = stream;
                document.getElementById('video-R').srcObject = stream;

                const camera = new Camera(document.getElementById('input_video'), {
                    onFrame: async () => {
                        await hands.send({image: document.getElementById('input_video')});
                    },
                    width: 640,
                    height: 480
                });
                camera.start();

                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } catch (err) {
                alert("Camera initialization failed: " + err.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>WebXR AMR Controller V3 - Neural Link</title>
    
    <!-- MediaPipe Tasks Vision ESM -->
    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // UI Globals
        const splash = document.getElementById('splash');
        const statusText = document.getElementById('init-status');
        const btnStart = document.getElementById('btn-start');

        let gestureRecognizer;
        let runningMode = "IMAGE";
        let webcamRunning = false;
        let videoElement = document.getElementById('input_video');
        let lastVideoTime = -1;

        // HUD Pointers
        const ui = {
            cmd: [document.getElementById('cmd-L'), document.getElementById('cmd-R')],
            cool: [document.getElementById('cool-L'), document.getElementById('cool-R')],
            dots: [document.getElementById('dot-L'), document.getElementById('dot-R')],
            x: [document.getElementById('x-L'), document.getElementById('x-R')],
            y: [document.getElementById('y-L'), document.getElementById('y-R')],
            z: [document.getElementById('z-L'), document.getElementById('z-R')],
            pinch: [document.getElementById('pinch-L'), document.getElementById('pinch-R')],
            flashes: [document.getElementById('flash-L'), document.getElementById('flash-R')]
        };

        let lastDispCommand = 'NONE';
        let commandCooldown = false;
        const COOLDOWN_MS = 1000;

        // Initialize Recognizer
        async function createGestureRecognizer() {
            statusText.textContent = "Loading AI Core...";
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 2
            });
            statusText.textContent = "Neural Link Ready";
            btnStart.classList.remove('hidden');
        }

        async function initApp() {
            splash.classList.add('fade-out');
            setTimeout(() => splash.style.display = 'none', 500);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 480 }
                });
                
                videoElement.srcObject = stream;
                document.getElementById('video-L').srcObject = stream;
                document.getElementById('video-R').srcObject = stream;
                
                await videoElement.play();
                requestAnimationFrame(predictLoop);

                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } catch (err) {
                alert("Camera Access Denied: " + err.message);
            }
        }

        function dispatchCommand(cmd) {
            if (commandCooldown || cmd === 'NONE') return;

            commandCooldown = true;
            ui.cool.forEach(c => {
                c.style.transition = 'none';
                c.style.width = '100%';
                setTimeout(() => {
                    c.style.transition = `width ${COOLDOWN_MS}ms linear`;
                    c.style.width = '0%';
                }, 10);
            });

            setTimeout(() => { commandCooldown = false; }, COOLDOWN_MS);

            ui.cmd.forEach(c => {
                c.textContent = cmd;
                c.classList.add('active');
            });
            
            ui.flashes.forEach(f => f.style.display = cmd === 'STOP' ? 'block' : 'none');
            
            window.parent.postMessage({ type: 'AMR_CMD', command: cmd }, '*');
            setTimeout(() => ui.cmd.forEach(c => c.classList.remove('active')), 700);
        }

        async function predictLoop() {
            if (videoElement.currentTime !== lastVideoTime) {
                lastVideoTime = videoElement.currentTime;
                const results = await gestureRecognizer.recognizeForVideo(videoElement, performance.now());

                const hasHands = results.landmarks && results.landmarks.length > 0;
                ui.dots.forEach(d => d.classList.toggle('active', hasHands));

                if (hasHands) {
                    const landmarks = results.landmarks[0];
                    const gesture = results.gestures && results.gestures[0] && results.gestures[0][0] ? results.gestures[0][0].categoryName : "None";
                    
                    // Coordinates & Depth
                    const x = landmarks[8].x;
                    const y = landmarks[8].y;
                    const z = landmarks[8].z; // Depth estimation

                    ui.x.forEach(v => v.textContent = x.toFixed(2));
                    ui.y.forEach(v => v.textContent = y.toFixed(2));
                    ui.z.forEach(v => v.textContent = (z * -100).toFixed(1));

                    // Pinch Detection (Landmark 4 vs 8)
                    const dist4_8 = Math.sqrt(
                        Math.pow(landmarks[4].x - landmarks[8].x, 2) +
                        Math.pow(landmarks[4].y - landmarks[8].y, 2)
                    );
                    const isPinching = dist4_8 < 0.05;
                    ui.pinch.forEach(p => p.classList.toggle('active', isPinching));

                    let cmd = 'NONE';

                    // Mapping Logic
                    if (gesture === 'Open_Palm') cmd = 'STOP';
                    else if (gesture === 'Closed_Fist') cmd = 'PICK';
                    else if (gesture === 'Victory') cmd = 'RETURN';
                    else if (isPinching) cmd = 'DROP';
                    else if (gesture === 'Pointing_Up') {
                        if (y < 0.25) cmd = 'UP';
                        else if (y > 0.75) cmd = 'DOWN';
                        else if (x < 0.25) cmd = 'LEFT';
                        else if (x > 0.75) cmd = 'RIGHT';
                        else cmd = 'MOVE';
                    }

                    if (cmd !== 'NONE') dispatchCommand(cmd);
                }
            }
            requestAnimationFrame(predictLoop);
        }

        // External Link to button
        window.initApp = initApp;
        createGestureRecognizer();
    </script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #0bffa3;
            --neon-red: #ff3c3c;
            --neon-orange: #ff983c;
            --glass: rgba(5, 10, 20, 0.92);
            --font: 'JetBrains Mono', 'Inter', monospace;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            font-family: var(--font);
            color: white;
        }

        .viewport {
            width: 50%; height: 100%;
            position: relative;
            overflow: hidden;
            border-right: 1px solid #111;
        }

        .camera-feed {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.15);
        }

        /* HUD Overlay */
        .hud {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .panel {
            background: var(--glass);
            border-left: 3px solid var(--neon-blue);
            backdrop-filter: blur(15px);
            padding: 10px 15px;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .label { font-size: 8px; font-weight: 800; color: var(--neon-blue); opacity: 0.8; margin-bottom: 2px; }
        .value { font-size: 14px; font-weight: 900; }

        .header, .footer { display: flex; justify-content: space-between; align-items: flex-start; }
        .footer { align-items: flex-end; }

        .center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .cmd-display {
            font-size: 28px;
            font-weight: 950;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 6px;
            padding: 10px 30px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 100px;
            opacity: 0;
            transform: scale(0.8);
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .cmd-display.active { opacity: 1; transform: scale(1); }

        .cooldown {
            width: 140px; height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 15px auto 0;
            position: relative;
        }
        .cooldown-fill { position: absolute; height: 100%; width: 0; background: var(--neon-blue); }

        .pinch-indicator {
            width: 50px; height: 50px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            transition: 0.2s;
        }
        .pinch-indicator.active {
            border-color: var(--neon-orange);
            color: var(--neon-orange);
            box-shadow: 0 0 20px rgba(255, 152, 60, 0.4);
            transform: scale(1.1);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        .dot.active { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        .flash { position: absolute; inset: 0; background: radial-gradient(circle, transparent, rgba(255,0,0,0.4)); display: none; z-index: 5; animation: blk 0.3s infinite alternate; }
        @keyframes blk { from { opacity: 0; } to { opacity: 1; } }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; z-index: 1000;
            background: #030610;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        #splash.fade-out { opacity: 0; pointer-events: none; }

        .btn {
            background: var(--neon-blue);
            border: none; padding: 15px 40px; font-weight: 900; letter-spacing: 2px;
            border-radius: 4px; cursor: pointer; color: black;
        }

        .lens { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 85%); z-index: 20; }
        .target { position: absolute; width:10px; height: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="splash">
        <div style="font-size: 40px; margin-bottom: 20px;">👁️</div>
        <h1 style="letter-spacing: 12px; font-size: 20px; color: var(--neon-blue);">NEURAL LINK V3</h1>
        <p id="init-status" style="color: #444; font-size: 10px; margin-bottom: 30px;">BOOTING AI MODULE...</p>
        <button id="btn-start" class="btn hidden" onclick="initApp()">ESTABLISH CONNECTION</button>
    </div>

    <video id="input_video" class="hidden" playsinline autoplay muted></video>

    <!-- Stereo View -->
    <div class="viewport">
        <video id="video-L" class="camera-feed" playsinline autoplay muted></video>
        <div class="flash" id="flash-L"></div>
        <div class="target"></div>
        <div class="hud">
            <div class="header">
                <div class="panel">
                    <div class="label">Status</div>
                    <div class="dot" id="dot-L"></div>
                </div>
                <div class="panel">
                    <div class="label">Depth</div>
                    <div class="value" id="z-L">0.0</div>
                </div>
            </div>
            <div class="center">
                <div class="pinch-indicator" id="pinch-L">🤏</div>
                <div class="cmd-display" id="cmd-L">STANDBY</div>
                <div class="cooldown"><div class="cooldown-fill" id="cool-L"></div></div>
            </div>
            <div class="footer">
                <div class="panel"><div class="label">Lat</div><div class="value" id="x-L">0.0</div></div>
                <div class="panel"><div class="label">Lng</div><div class="value" id="y-L">0.0</div></div>
            </div>
        </div>
        <div class="lens"></div>
    </div>

    <div class="viewport">
        <video id="video-R" class="camera-feed" playsinline autoplay muted></video>
        <div class="flash" id="flash-R"></div>
        <div class="target"></div>
        <div class="hud">
            <div class="header">
                <div class="panel">
                    <div class="label">Status</div>
                    <div class="dot" id="dot-R"></div>
                </div>
                <div class="panel">
                    <div class="label">Depth</div>
                    <div class="value" id="z-R">0.0</div>
                </div>
            </div>
            <div class="center">
                <div class="pinch-indicator" id="pinch-R">🤏</div>
                <div class="cmd-display" id="cmd-R">STANDBY</div>
                <div class="cooldown"><div class="cooldown-fill" id="cool-R"></div></div>
            </div>
            <div class="footer">
                <div class="panel"><div class="label">Lat</div><div class="value" id="x-R">0.0</div></div>
                <div class="panel"><div class="label">Lng</div><div class="value" id="y-R">0.0</div></div>
            </div>
        </div>
        <div class="lens"></div>
    </div>
</body>
</html>

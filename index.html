<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>WebXR Robot Controller - 9 Gesture HUD</title>
    
    <!-- MediaPipe Tasks ESM -->
    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const splash = document.getElementById('splash');
        const video = document.getElementById('input_video');
        const vL = document.getElementById('v-L');
        const vR = document.getElementById('v-R');

        let gestureRecognizer;
        let lastTime = -1;
        let cooldown = false;

        // HUD Elements
        const labels = [document.getElementById('lbl-L'), document.getElementById('lbl-R')];
        const dots = [document.getElementById('dot-L'), document.getElementById('dot-R')];

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO"
            });
            document.getElementById('init-txt').textContent = "LINK READY";
            document.getElementById('btn-start').classList.remove('hidden');
        }

        window.initApp = async () => {
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                vL.srcObject = stream;
                vR.srcObject = stream;
                video.play();
                requestAnimationFrame(loop);
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } catch (e) { alert(e.message); }
        };

        function dispatch(cmd) {
            if (cooldown || cmd === 'NONE') return;
            cooldown = true;
            console.log("EXEC:", cmd);
            window.parent.postMessage({ type: 'ROBOT_COMMAND', command: cmd }, '*');
            setTimeout(() => cooldown = false, 500);
        }

        async function loop() {
            if (video.currentTime !== lastTime) {
                lastTime = video.currentTime;
                const results = await gestureRecognizer.recognizeForVideo(video, performance.now());
                const hasHands = results.landmarks && results.landmarks.length > 0;
                
                dots.forEach(d => d.classList.toggle('active', hasHands));

                if (hasHands) {
                    const lms = results.landmarks[0];
                    const gesture = results.gestures[0] && results.gestures[0][0] ? results.gestures[0][0].categoryName : "None";
                    
                    const x = lms[8].x;
                    const y = lms[8].y;

                    // Pinch Detection
                    const pinchDist = Math.hypot(lms[4].x - lms[8].x, lms[4].y - lms[8].y);
                    const isPinching = pinchDist < 0.05;

                    let cmd = 'NONE';
                    if (gesture === 'Open_Palm') cmd = 'STOP';
                    else if (gesture === 'Closed_Fist') cmd = 'PICK';
                    else if (gesture === 'Victory') cmd = 'RETURN';
                    else if (isPinching) cmd = 'DROP';
                    else if (gesture === 'Pointing_Up') {
                        if (y < 0.3) cmd = 'UP';
                        else if (y > 0.7) cmd = 'DOWN';
                        else if (x < 0.3) cmd = 'LEFT';
                        else if (x > 0.7) cmd = 'RIGHT';
                        else cmd = 'MOVE';
                    }

                    // Real-time Visual Label
                    labels.forEach(l => {
                        l.textContent = cmd !== 'NONE' ? cmd : "";
                        l.classList.toggle('active', cmd !== 'NONE');
                    });

                    if (cmd !== 'NONE') dispatch(cmd);
                } else {
                    labels.forEach(l => l.textContent = "");
                }
            }
            requestAnimationFrame(loop);
        }

        initAI();
    </script>

    <style>
        :root {
            --neon: #00f2ff;
            --glass: rgba(10, 15, 25, 0.9);
            --font: 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            font-family: var(--font);
            color: white;
        }

        .viewport {
            width: 50%; height: 100%;
            position: relative;
            overflow: hidden;
            border-right: 1px solid #111;
        }

        .cam {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.15);
        }

        /* The Main Overlay */
        .hud {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cmd-label {
            font-size: 40px;
            font-weight: 900;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px var(--neon);
            opacity: 0;
            transform: scale(0.8);
            transition: 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .cmd-label.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Secondary Stats */
        .stats {
            position: absolute;
            top: 40px; left: 40px;
            background: var(--glass);
            padding: 10px 15px;
            border-radius: 4px;
            border-left: 2px solid var(--neon);
        }

        .status-dot {
            position: absolute;
            top: 40px; right: 40px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #333;
        }
        .status-dot.active { background: #0f0; box-shadow: 0 0 10px #0f0; }

        .lens { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 85%); z-index: 20; }
        
        #splash {
            position: fixed; inset: 0; z-index: 1000;
            background: #050a15;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }

        .btn {
            background: var(--neon);
            color: black; border: none; padding: 15px 40px;
            font-weight: 900; border-radius: 4px; cursor: pointer;
            letter-spacing: 2px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="splash">
        <h1 style="letter-spacing: 12px; margin-bottom: 20px;">AMR VR LINK</h1>
        <p id="init-txt" style="color: grey; font-size: 10px; margin-bottom: 30px;">CONNECTING TO AI MODULE...</p>
        <button id="btn-start" class="btn hidden" onclick="initApp()">ESTABLISH LINK</button>
    </div>

    <video id="input_video" class="hidden" playsinline autoplay muted></video>

    <div class="viewport">
        <video id="v-L" class="cam" playsinline autoplay muted></video>
        <div class="status-dot" id="dot-L"></div>
        <div class="stats"><div style="font-size: 10px; color: var(--neon);">LINK STATUS</div><div style="font-size: 12px;">ACTIVE</div></div>
        <div class="hud"><div id="lbl-L" class="cmd-label">MOVE</div></div>
        <div class="lens"></div>
    </div>

    <div class="viewport">
        <video id="v-R" class="cam" playsinline autoplay muted></video>
        <div class="status-dot" id="dot-R"></div>
        <div class="stats"><div style="font-size: 10px; color: var(--neon);">LINK STATUS</div><div style="font-size: 12px;">ACTIVE</div></div>
        <div class="hud"><div id="lbl-R" class="cmd-label">MOVE</div></div>
        <div class="lens"></div>
    </div>
</body>
</html>
